<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFE OS">
<meta name="theme-color" content="#080809">
<title>LIFE OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080809; --s1:#0f0f12; --s2:#141418; --s3:#1a1a20;
  --border:#222228; --text:#f0f0f5; --sub:#9090a8; --muted:#48485a;
  --blue:#4f80ff; --green:#25d48a; --red:#ff4567; --gold:#f0c040; --gray:#7070a0;
  --mono:'Space Mono',monospace; --sans:'Syne',sans-serif; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;background:rgba(8,8,9,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:13px;font-weight:800;letter-spacing:5px;text-transform:uppercase}.logo span{color:var(--blue)}
.top-right{display:flex;gap:24px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--sub)}
.top-right strong{color:var(--text)}
.period-bar{display:flex;align-items:center;gap:8px}
.period-track{width:90px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.period-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px;transition:width .5s}
/* AI button in topbar */
.ai-toggle{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--sub);font-family:var(--mono);font-size:10px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.ai-toggle:hover{border-color:var(--blue);color:var(--text)}
.ai-toggle .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TABS */
.tabs{display:flex;padding:0 32px;background:var(--s1);border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;color:var(--muted);transition:.2s}
.tab:hover{color:var(--sub)}.tab.active{color:var(--text);border-bottom-color:var(--blue)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 20px}
.panel{display:none}.panel.active{display:block}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:20px;margin-top:8px}
.sh-title{font-size:10px;font-family:var(--mono);letter-spacing:3px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sh-line{flex:1;height:1px;background:var(--border)}

/* GRIDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:28px}
.grid-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}

/* DONUT ROW */
.donuts-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:32px}
.donut-card{background:var(--s1);border-radius:var(--r);padding:32px 24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;min-width:160px;transition:transform .2s}
.donut-card:hover{transform:translateY(-2px)}
.donut-name{font-size:13px;font-family:var(--sans);font-weight:700;color:var(--text);text-align:center}
.donut-sub{font-size:10px;font-family:var(--mono);color:var(--muted);text-align:center;margin-top:-6px}

/* GOAL CARD */
.gcard{background:var(--s1);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:transform .2s}
.gcard::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--ca,var(--blue)) 0%,transparent 100%);opacity:.7}
.gcard:hover{transform:translateY(-2px)}
.gc-label{font-size:13px;font-family:var(--sans);font-weight:700;color:var(--text);margin-bottom:10px}
.gc-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:2px;color:var(--text)}
.gc-val span{font-size:13px;color:var(--muted);font-weight:400;margin-left:2px}
.gc-pct{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:12px}
.pbar{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .5s}
.gc-btns{display:flex;gap:6px;margin-top:14px}
.bsm{font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:.15s}
.bsm:hover{border-color:var(--ca,var(--blue));color:var(--text)}
.bsm.p{background:var(--ca,var(--blue));border-color:transparent;color:#fff}.bsm.p:hover{opacity:.85}

/* CONTENT BIG DONUTS */
.content-donut-grid{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:28px}
.content-donut-card{background:var(--s1);border-radius:18px;padding:28px 24px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;min-width:180px;transition:transform .2s}
.content-donut-card:hover{transform:translateY(-3px)}
.cd-label{font-size:14px;font-family:var(--sans);font-weight:800;color:var(--text);text-align:center;letter-spacing:-.2px}
.cd-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--text);text-align:center;line-height:1}.cd-val span{font-size:12px;color:var(--muted);font-weight:400}
.cd-freq{font-size:10px;font-family:var(--mono);color:var(--muted);text-align:center;margin-top:-4px}
.cd-btns{display:flex;gap:8px;margin-top:6px;align-items:center}
.cd-btns .bsm{min-width:38px;text-align:center}
.bcard{background:var(--s1);border-radius:var(--r);padding:18px 20px;transition:transform .2s}
.bcard:hover{transform:translateY(-2px)}
.bcard-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bcard-icon{font-size:18px;line-height:1}
.bcard-name{font-size:13px;font-family:var(--sans);font-weight:700;color:var(--text)}
.bcard-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:2px}
.bcard-val span{font-size:11px;color:var(--muted);font-weight:400}
.bcard-info{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:10px}
.bcard-btns{display:flex;gap:6px;margin-top:12px}

/* FINANCE */
.fin-card{background:var(--s1);border-radius:var(--r);padding:28px;margin-bottom:16px}
.fin-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.fin-big{font-size:48px;font-weight:800;font-family:var(--mono);color:var(--green);letter-spacing:-2px;line-height:1}
.fin-label{font-size:9px;font-family:var(--mono);letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.fin-right{text-align:right}
.fin-left-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--sub)}
.fin-per-day{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:4px}
.fin-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.fin-bar-f{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width .5s}
.fin-pct{font-family:var(--mono);font-size:11px;color:var(--green)}
.fin-row{display:flex;gap:8px;margin-top:20px}
.fin-in{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.fin-in:focus{border-color:var(--green)}
.fin-btn{background:var(--green);border:none;border-radius:10px;padding:10px 16px;color:#000;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer}
.fin-btn:hover{opacity:.85}
.fin-btn.sec{background:var(--s3);color:var(--sub)}

/* KANBAN */
.kb-sphere{margin-bottom:32px}
.kb-sphere-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.kb-sphere-title{font-size:13px;font-family:var(--sans);font-weight:700;letter-spacing:0;text-transform:none}
.kb-sphere-line{flex:1;height:1px;background:var(--border)}
.kb-sphere-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:.15s}
.kb-sphere-btn:hover{border-color:var(--blue);color:var(--text)}
.kb-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kcol{background:var(--s1);border-radius:12px;padding:14px;min-height:100px;transition:background .2s}
.kcol.over{background:var(--s2)}
.kcol-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.kcol-title{font-size:11px;font-family:var(--sans);font-weight:700}
.kcol-cnt{font-size:9px;font-family:var(--mono);color:var(--muted);background:var(--s3);padding:1px 8px;border-radius:20px}
.kcard{background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:grab;transition:.15s;user-select:none;border:1px solid transparent}
.kcard:hover{border-color:var(--border)}
.kcard-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.35;color:var(--text)}
.kcard-meta{display:flex;align-items:center}
.kdel{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;line-height:1}
.kdel:hover{color:var(--red)}
.add-card{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:7px;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;transition:.15s}
.add-card:hover{border-color:var(--blue);color:var(--sub)}

/* ── AI PANEL — compact floating ── */
.ai-panel{position:fixed;right:24px;top:64px;width:320px;background:var(--s1);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,.6);opacity:0;pointer-events:none;transform:translateY(-8px);transition:opacity .2s,transform .2s}
.ai-panel.open{opacity:1;pointer-events:all;transform:translateY(0)}
.ai-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ai-head-title{font-size:10px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:7px}
.ai-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px}
.ai-close:hover{color:var(--text)}
.ai-messages{height:160px;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.ai-msg{padding:7px 11px;border-radius:9px;font-size:12px;line-height:1.5;max-width:95%}
.ai-msg.assistant{background:var(--s2);color:var(--sub);align-self:flex-start}
.ai-msg.user{background:var(--blue);color:#fff;align-self:flex-end}
.ai-msg.system{background:transparent;color:var(--muted);font-family:var(--mono);font-size:9px;text-align:center;align-self:center}
.ai-msg.error{background:rgba(255,69,103,.1);color:var(--red);align-self:flex-start;font-size:11px}
.ai-thinking{display:flex;gap:4px;align-items:center;padding:7px 11px}
.ai-thinking span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite}
.ai-thinking span:nth-child(2){animation-delay:.15s}
.ai-thinking span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.ai-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.ai-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;resize:none;line-height:1.4;height:34px}
.ai-input:focus{border-color:var(--blue)}
.ai-send{background:var(--blue);border:none;border-radius:8px;padding:7px 12px;color:#fff;font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap;height:34px}
.ai-send:hover{opacity:.85}
.ai-send:disabled{opacity:.4;cursor:default}

/* MODAL */
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center}
.mbk.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:28px;min-width:320px;max-width:420px;width:90%}
.modal-t{font-size:10px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.minput{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;margin-bottom:10px}
.minput:focus{border-color:var(--blue)}
.msel{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;margin-bottom:10px}
.mrow{display:flex;gap:8px}
.mbtn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer}
.mbtn.p{background:var(--blue);border-color:transparent;color:#fff}.mbtn:hover{opacity:.85}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LAST ENTRY */
.last-entry{margin-top:8px;padding:16px 20px;background:var(--s1);border-radius:12px;display:flex;flex-direction:column;gap:6px}
.last-entry-label{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.last-entry-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.last-entry-name{font-size:14px;font-weight:700;color:var(--text)}
.last-entry-val{font-size:13px;font-family:var(--mono);color:var(--green)}
.last-entry-date{font-size:11px;font-family:var(--mono);color:var(--muted);margin-left:auto}

/* ── WEEK PLANNER ── */
.wk-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.wk-nav{background:none;border:1px solid var(--border);border-radius:8px;color:var(--sub);font-size:13px;padding:7px 16px;cursor:pointer;font-family:var(--mono);transition:.15s}
.wk-nav:hover{border-color:var(--blue);color:var(--text)}
.wk-period{flex:1;font-size:15px;font-weight:800;color:var(--text)}

/* Grid with time axis */
.wk-week-wrap{display:flex;gap:0;margin-bottom:6px}
.wk-time-col{display:flex;flex-direction:column;flex-shrink:0;width:32px;margin-top:38px}
.wk-time-label{height:70px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;font-family:var(--mono);color:var(--sub);opacity:.9;white-space:nowrap;margin-bottom:2px}
.wk-days-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

/* Day card */
.wk-day{background:var(--s1);border-radius:8px;overflow:hidden;border:1px solid transparent;transition:border-color .2s}
.wk-day.today{border-color:var(--blue)}
.wk-day.past .wk-day-name,.wk-day.past .wk-day-num{opacity:.35}
.wk-day-head{padding:6px 8px 5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);height:38px}
.wk-day-name{font-size:8px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.wk-day-num{font-size:15px;font-weight:800;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.wk-day.today .wk-day-num{background:var(--blue);color:#fff}
.wk-slots{padding:3px;display:flex;flex-direction:column;gap:2px}

/* FIXED HEIGHT slot — 1 task max */
.wk-slot{border-radius:5px;border:1px dashed var(--border);height:70px;overflow:hidden;display:flex;align-items:center;padding:0 8px;transition:border-color .15s,background .15s;cursor:pointer;position:relative}
.wk-slot:hover{border-color:var(--muted);background:rgba(255,255,255,.02)}
.wk-slot-lbl{display:none}
.wk-slot-empty-hint{font-size:9px;font-family:var(--mono);color:var(--muted);opacity:0;transition:opacity .15s;width:100%;text-align:center}
.wk-slot:hover .wk-slot-empty-hint{opacity:.45}

/* Single task — multi-line, max text */
.wk-task{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;width:100%}
.wk-task-title{font-size:11px;font-weight:700;color:var(--text);overflow:hidden;flex:1;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word}
.wk-task-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:0;line-height:1;flex-shrink:0;opacity:0;transition:opacity .15s;margin-top:1px}
.wk-slot:hover .wk-task-del{opacity:1}
.wk-task-del:hover{color:var(--red)}

.wk-slot-filled{border-style:solid;border-color:var(--border);background:rgba(79,128,255,.08)}
.wk-slot-filled:hover{border-color:var(--blue);background:rgba(79,128,255,.14)}
/* BLOCK MODAL */
.bm-colors{display:flex;gap:8px;margin-bottom:10px}
.bm-color{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
.bm-color.active{border-color:var(--text)}

/* ══════════════════════════════════════
   MOBILE RESPONSIVE — ≤768px
   ══════════════════════════════════════ */
@media(max-width:768px){

  /* TOP BAR — compact */
  .topbar{padding:0 16px;height:48px}
  .logo{font-size:11px;letter-spacing:3px}
  .top-right{gap:10px;font-size:10px}
  /* Hide period bar and date on mobile */
  .period-bar,.top-right>span:nth-child(2){display:none}
  .top-right>span:first-child{display:none}
  .ai-toggle{padding:4px 10px;font-size:9px}

  /* TABS — scrollable horizontal, BIG for mobile */
  .tabs{padding:0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:16px 18px;font-size:13px;letter-spacing:1px;white-space:nowrap;min-height:52px}

  /* MAIN */
  .main{padding:16px 12px}

  /* GRIDS — single column */
  .grid{grid-template-columns:1fr;gap:10px;margin-bottom:20px}
  .grid-sm{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}

  /* DONUTS — 2 per row on mobile */
  .donuts-row{gap:8px}
  .donut-card{min-width:calc(50% - 4px);max-width:calc(50% - 4px);padding:18px 12px 14px}

  /* CONTENT DONUTS — vertical stack */
  .content-donut-grid{flex-direction:column;gap:12px}
  .content-donut-card{min-width:unset;padding:20px 16px 16px}

  /* GOAL CARDS */
  .gcard{padding:16px}
  .gc-val{font-size:26px}

  /* BODY/LIFE CARDS */
  .bcard{padding:14px 16px}
  .bcard-val{font-size:22px}

  /* FINANCE */
  .fin-card{padding:20px}
  .fin-big{font-size:34px}
  .fin-top{flex-direction:column;gap:12px}
  .fin-right{text-align:left}
  .fin-row{flex-wrap:wrap}
  .fin-in{min-width:100%;margin-bottom:4px}

  /* KANBAN — stacked, not 3 columns */
  .kb-cols{grid-template-columns:1fr;gap:8px}
  .kb-sphere{margin-bottom:20px}
  .kb-sphere-title{font-size:12px}

  /* WEEK — completely different layout on mobile */
  .wk-week-wrap{flex-direction:column}
  .wk-time-col{display:none} /* hide side time axis */
  .wk-days-grid{
    display:flex;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    gap:6px;
    padding-bottom:4px;
  }
  .wk-days-grid::-webkit-scrollbar{display:none}
  .wk-day{min-width:120px;flex-shrink:0}
  .wk-slot{height:60px}
  .wk-task-title{font-size:10px}
  .wk-header{flex-wrap:wrap;gap:8px}
  .wk-period{font-size:13px;width:100%;order:3}

  /* AI PANEL — full width on mobile */
  .ai-panel{width:100%;right:0;top:48px;border-radius:0 0 14px 14px;border-left:none;border-right:none;border-top:none}
  .ai-messages{height:140px}

  /* MODALS — full width */
  .modal{max-width:100%;width:calc(100% - 24px);padding:20px}

  /* SECTION HEADERS */
  .sh{margin-bottom:14px}
  .sh-title{font-size:9px;letter-spacing:2px}

  /* OVERVIEW — last entry */
  .last-entry{padding:12px 14px}
  .last-entry-row{flex-direction:column;gap:4px;align-items:flex-start}
  .last-entry-date{margin-left:0}
}

/* Extra small — iPhone SE etc */
@media(max-width:390px){
  .grid-sm{grid-template-columns:1fr}
  .donuts-row{gap:6px}
  .donut-card{min-width:calc(50% - 3px);padding:14px 8px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">LIFE <span>OS</span></div>
  <div class="top-right">
    <span id="todayStr">—</span>
    <span>→ 01.08.2026</span>
    <span>Осталось: <strong id="daysLeft">—</strong> дн.</span>
    <div class="period-bar">
      <div class="period-track"><div class="period-fill" id="pFill" style="width:0%"></div></div>
      <strong id="pPct">0%</strong>
    </div>
    <button class="ai-toggle" onclick="toggleAI()">
      <div class="dot"></div> AI Ассистент
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'overview')">Обзор</button>
  <button class="tab" onclick="switchTab(this,'week')">Неделя</button>
  <button class="tab" onclick="switchTab(this,'content')">Контент</button>
  <button class="tab" onclick="switchTab(this,'finance')">Финансы</button>
  <button class="tab" onclick="switchTab(this,'body')">Энергия</button>
  <button class="tab" onclick="switchTab(this,'life')">Жизнь</button>
  <button class="tab" onclick="switchTab(this,'kanban')">Задачи</button>
</div>

<div class="main">

<!-- WEEK -->
<div class="panel" id="panel-week">
  <div class="wk-header">
    <button class="wk-nav" onclick="shiftView(-1)">←</button>
    <button class="wk-nav" onclick="goToday()">Сегодня</button>
    <button class="wk-nav" onclick="shiftView(1)">→</button>
    <div class="wk-period" id="wkPeriod">—</div>
  </div>
  <div id="wkGrid"></div>
</div>

<!-- OVERVIEW -->
<div class="panel active" id="panel-overview">
  <div class="sh"><div class="sh-title">Ключевые цели</div><div class="sh-line"></div></div>
  <div class="donuts-row" id="overviewGoals"></div>
  <div id="lastEntryBlock"></div>
</div>

<!-- CONTENT -->
<div class="panel" id="panel-content">
  <div class="sh"><div class="sh-title">YouTube & Контент</div><div class="sh-line"></div></div>
  <div class="content-donut-grid" id="contentGoals"></div>
</div>

<!-- FINANCE -->
<div class="panel" id="panel-finance">
  <div class="sh"><div class="sh-title">Финансы</div><div class="sh-line"></div></div>
  <div class="fin-card">
    <div class="fin-top">
      <div>
        <div class="fin-label">Заработано</div>
        <div class="fin-big" id="finAmt">0 ₽</div>
      </div>
      <div class="fin-right">
        <div class="fin-label">Осталось</div>
        <div class="fin-left-val" id="finLeft">1 000 000 ₽</div>
        <div class="fin-per-day">В день: <span id="finDay">—</span></div>
      </div>
    </div>
    <div class="fin-bar"><div class="fin-bar-f" id="finBar" style="width:0%"></div></div>
    <div class="fin-pct" id="finPct">0% из 1 000 000 ₽</div>
    <div class="fin-row">
      <input class="fin-in" type="number" id="finIn" placeholder="Сумма…">
      <button class="fin-btn" onclick="addFin()">+ Добавить</button>
      <button class="fin-btn sec" onclick="setFin()">= Установить</button>
    </div>
  </div>
  <div class="sh"><div class="sh-title">Лиды & Продажи</div><div class="sh-line"></div></div>
  <div class="grid" id="finGoals"></div>
</div>

<!-- BODY/ENERGY -->
<div class="panel" id="panel-body">
  <div class="sh"><div class="sh-title">Энергия & Тело</div><div class="sh-line"></div></div>

</div>

<!-- LIFE -->
<div class="panel" id="panel-life">

</div>

<!-- AI PANEL -->

<div class="mbk" id="wkDetailModal">
  <div class="modal" style="text-align:center">

    <div id="wkDetailTitle" style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:22px;line-height:1.3"></div>
    <div class="mrow">
      <button class="mbtn" onclick="wkCloseDetail()">Закрыть</button>
      <button class="mbtn" onclick="wkEditFromDetail()" style="border-color:var(--blue);color:var(--blue)">✏ Изменить</button>
      <button class="mbtn" onclick="wkDelFromDetail()" style="border-color:var(--red);color:var(--red)">✕ Удалить</button>
    </div>

</div>

    <div class="mrow">
      <button class="mbtn" onclick="wkCloseAdd()">Отмена</button>
      <button class="mbtn p" onclick="wkSaveAdd()">Добавить</button>

</div>

<!-- MODAL -->
<div class="mbk" id="mbk">
  <div class="modal">
    <div class="modal-t" id="mModalTitle">Новая задача</div>
    <input class="minput" id="mTitle" placeholder="Название задачи…">
    <select class="msel" id="mCol">
      <option value="todo">To Do</option>
      <option value="inprogress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <div class="mrow">
      <button class="mbtn" onclick="closeModal()">Отмена</button>
      <button class="mbtn p" onclick="saveCard()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ── DATES ──
const START = new Date(2026, 2, 20);
const END   = new Date(2026, 7, 1);
const TDAYS = Math.round((END - START) / 86400000);
const TW    = Math.ceil(TDAYS / 7);

// ── DEFS — mutable, can be patched by AI ──
let GDEFS = [
  {id:'yt_long',  grp:'content',  label:'YouTube Ролики',    sub:'2/нед', target:TW*2,                ca:'var(--blue)'},
  {id:'yt_short', grp:'content',  label:'YouTube Shorts',    sub:'6/нед', target:TW*6,                ca:'var(--blue)'},
  {id:'tg',       grp:'content',  label:'Telegram Посты',    sub:'4/нед', target:TW*4,                ca:'var(--blue)'},
  {id:'leads',    grp:'finance',  label:'Лиды',              sub:'',      target:100,                 ca:'var(--green)'},
  {id:'consults', grp:'finance',  label:'Консультации',      sub:'',      target:30,                  ca:'var(--green)'},
  {id:'sales',    grp:'finance',  label:'Продажи',           sub:'',      target:10,                  ca:'var(--gold)'},
  {id:'stream',   grp:'finance',  label:'Выступление / Эфир',sub:'1/2нед',target:Math.round(TW/2),    ca:'var(--red)'},
];

let BDEFS = [
  {id:'gym',   label:'Зал',              icon:'🏋️', freq:'2×/нед',  target:TW*2,                bc:'var(--blue)'},
  {id:'act',   label:'Доп. активность',  icon:'⚡', freq:'1×/нед',  target:TW,                  bc:'var(--blue)'},
  {id:'sauna', label:'Баня',             icon:'🔥', freq:'2×/нед',  target:TW*2,                bc:'var(--red)'},
  {id:'walk',  label:'Прогулка',         icon:'🚶', freq:'ежедн.',  target:111,                 bc:'var(--green)'},
  {id:'med_m', label:'Утр. медитация',   icon:'🌅', freq:'ежедн.',  target:111,                 bc:'var(--gold)'},
  {id:'med_e', label:'Веч. медитация',   icon:'🌙', freq:'ежедн.',  target:111,                 bc:'var(--gold)'},
  {id:'learn', label:'Обучение',         icon:'📚', freq:'1/3 дня', target:Math.round(TDAYS/3), bc:'var(--gray)'},
  {id:'psych', label:'Психолог',         icon:'🧠', freq:'1/2 нед', target:Math.round(TW/2),    bc:'var(--blue)'},
  {id:'cold',  label:'Холодный душ',     icon:'🧊', freq:'ежедн.',  target:75,                  bc:'var(--blue)'},
  {id:'massage',label:'Массаж',          icon:'💆', freq:'1/2 нед', target:Math.round(TW/2),    bc:'var(--gold)'},
];

let LDEFS = [
  {id:'friends', label:'Встреча с другом',     icon:'👥', freq:'1/2 нед',  target:Math.round(TW/2),   bc:'var(--green)'},
  {id:'date',    label:'Свидание',              icon:'💃', freq:'1/2 нед',  target:Math.round(TW/2),   bc:'var(--red)'},
  {id:'concert', label:'Концерт',               icon:'🎵', freq:'1/2 нед',  target:Math.round(TW/2),   bc:'var(--blue)'},
  {id:'eve',     label:'Вечер контента',        icon:'🎬', freq:'2×/нед',   target:TW*2,               bc:'var(--gray)'},
  {id:'cs',      label:'CS2',                   icon:'🎮', freq:'2-3×/нед', target:Math.round(TW*2.5), bc:'var(--gray)'},
  {id:'trip',    label:'Поездка / смена обст.', icon:'✈️', freq:'1/3.5 нед',target:Math.round(TW/3.5), bc:'var(--blue)'},
];

// ── STORAGE ──
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}

// Version check — bump this when defs structure changes
const DEFS_VERSION = '6';
if(ld('lo_defs_ver',null) !== DEFS_VERSION){
  localStorage.removeItem('lo_bdefs');
  localStorage.removeItem('lo_ldefs');
  localStorage.removeItem('lo_gdefs');
  sv('lo_defs_ver', DEFS_VERSION);
}

let cnts = ld('lo_c',{});
let fin  = ld('lo_f',0);
let lastEntry = ld('lo_last', null); // {label, value, date}
let kb   = ld('lo_kb2',{
  content:{todo:[],inprogress:[],done:[]},
  katya:  {todo:[],inprogress:[],done:[]},
  finance:{todo:[],inprogress:[],done:[]},
  body:   {todo:[],inprogress:[],done:[]},
  life:   {todo:[],inprogress:[],done:[]},
});
// persist custom defs
let customBDEFS = ld('lo_bdefs', null);
let customLDEFS = ld('lo_ldefs', null);
let customGDEFS = ld('lo_gdefs', null);
if(customBDEFS) BDEFS = customBDEFS;
if(customLDEFS) LDEFS = customLDEFS;
if(customGDEFS) GDEFS = customGDEFS;

function saveDefs(){ sv('lo_bdefs',BDEFS); sv('lo_ldefs',LDEFS); sv('lo_gdefs',GDEFS); }

function gc(id){return cnts[id]||0}
function sc(id,n){
  cnts[id]=Math.max(0,n);
  sv('lo_c',cnts);
  // find label for this id
  const all=[...GDEFS,...BDEFS,...LDEFS];
  const def=all.find(d=>d.id===id);
  if(def){
    lastEntry={label:def.label,value:cnts[id],date:new Date().toISOString()};
    sv('lo_last',lastEntry);
  }
  renderAll();
}
function inc(id){sc(id,gc(id)+1)}
function dec(id){sc(id,gc(id)-1)}
function pct(v,t){return t===0?0:Math.min(100,Math.round(v/t*100))}
function fmt(n){return Math.round(n).toLocaleString('ru-RU')}
function lifeTotal(){return LDEFS.reduce((a,d)=>a+gc(d.id),0)}
function lifeTotalTarget(){return LDEFS.reduce((a,d)=>a+d.target,0)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ── TOP BAR ──
function renderTopBar(){
  const now = new Date();
  const p2 = n=>String(n).padStart(2,'0');
  document.getElementById('todayStr').textContent = `${p2(now.getDate())}.${p2(now.getMonth()+1)}.${now.getFullYear()}`;
  const dLeft = Math.max(0, Math.ceil((END-now)/86400000));
  document.getElementById('daysLeft').textContent = dLeft;
  const prog = Math.max(0,Math.min(1,(now-START)/(END-START)));
  const pp = Math.round(prog*100);
  document.getElementById('pFill').style.width = pp+'%';
  document.getElementById('pPct').textContent  = pp+'%';
}

// ── DONUT SVG ──
function donutSVG(pctVal, color, size=100, sw=10){
  const r=(size-sw)/2, cx=size/2, cy=size/2;
  const circ=2*Math.PI*r, filled=circ*(pctVal/100);
  const id='dg'+uid();
  const dash = filled>1
    ? `stroke-dasharray="${(filled-1).toFixed(1)} ${(circ-filled+1).toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"`
    : `stroke-dasharray="0 ${circ.toFixed(1)}"`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${color}"/>
      <stop offset="100%" stop-color="${color}" stop-opacity=".45"/>
    </linearGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a20" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="${sw}" ${dash}/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="14" font-weight="700" fill="#f0f0f5">${pctVal}%</text>
  </svg>`;
}

// ── RENDER OVERVIEW ──
function overviewDonutCard(pctVal, color, label, sub){
  return `<div class="donut-card">
    ${donutSVG(pctVal, color, 120, 12)}
    <div class="donut-name">${label}</div>
    <div class="donut-sub">${sub}</div>
  </div>`;
}

function renderOverview(){
  const all=[...GDEFS,...BDEFS,...LDEFS];
  let tot=0; all.forEach(g=>tot+=pct(gc(g.id),g.target));
  const avg  = Math.round(tot/all.length);
  const bPct = Math.round(BDEFS.reduce((a,d)=>a+pct(gc(d.id),d.target),0)/BDEFS.length);
  const lPct = pct(lifeTotal(), lifeTotalTarget());
  const ytVal = gc('yt_long'), ytTgt = TW*2, ytPct = pct(ytVal, ytTgt);
  const leadsVal = gc('leads'), leadsPct = pct(leadsVal, 100);

  document.getElementById('overviewGoals').innerHTML =
    overviewDonutCard(avg,      '#4f80ff', 'Общий прогресс', 'все сферы') +
    overviewDonutCard(ytPct,    '#4f80ff', 'YouTube Ролики',  `${ytVal} / ${ytTgt}`) +
    overviewDonutCard(leadsPct, '#25d48a', 'Лиды',            `${leadsVal} / 100`) +
    overviewDonutCard(bPct,     '#ff4567', 'Энергия',         'все активности') +
    overviewDonutCard(lPct,     '#25d48a', 'Жизнь',           lifeTotal()+' событий');

  renderLastEntry();
}

function renderLastEntry(){
  const el = document.getElementById('lastEntryBlock');
  if(!el) return;
  if(!lastEntry){ el.innerHTML=''; return; }
  const d = new Date(lastEntry.date);
  const p2 = n=>String(n).padStart(2,'0');
  const dateStr = `${p2(d.getDate())}.${p2(d.getMonth()+1)}.${d.getFullYear()}`;
  const timeStr = `${p2(d.getHours())}:${p2(d.getMinutes())}`;
  el.innerHTML = `<div class="last-entry">
    <div class="last-entry-label">Последнее добавление</div>
    <div class="last-entry-row">
      <span class="last-entry-name">${lastEntry.label}</span>
      <span class="last-entry-val">→ ${lastEntry.value}</span>
      <span class="last-entry-date">${dateStr} в ${timeStr}</span>
    </div>
  </div>`;
}

function lifeCardHTML(){
  const v=lifeTotal(),t=lifeTotalTarget(),p=pct(v,t);
  return `<div class="gcard" style="--ca:var(--green)">
    <div class="gc-label">Жизнь (всё)</div>
    <div class="gc-val">${v}<span> / ${t}</span></div>
    <div class="gc-pct">${p}%</div>
    <div class="pbar"><div class="pfill" style="width:${p}%;background:var(--green)"></div></div>
    <div style="font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:10px;letter-spacing:1px">
      👥${gc('friends')} &nbsp;💃${gc('date')} &nbsp;🎵${gc('concert')} &nbsp;🎬${gc('eve')} &nbsp;🎮${gc('cs')} &nbsp;💆${gc('massage')} &nbsp;✈️${gc('trip')}
    </div>
  </div>`;
}

function gcardHTML(g){
  const v=gc(g.id),p=pct(v,g.target);
  return `<div class="gcard" style="--ca:${g.ca}">
    <div class="gc-label">${g.label}${g.sub?' · '+g.sub:''}</div>
    <div class="gc-val">${fmt(v)}<span> / ${fmt(g.target)}</span></div>
    <div class="gc-pct">${p}%</div>
    <div class="pbar"><div class="pfill" style="width:${p}%;background:${g.ca}"></div></div>
    <div class="gc-btns">
      <button class="bsm" style="--ca:${g.ca}" onclick="dec('${g.id}')">−</button>
      <button class="bsm p" style="--ca:${g.ca}" onclick="inc('${g.id}')">+ 1</button>
      <button class="bsm" style="--ca:${g.ca}" onclick="promptSet('${g.id}','${g.label}')">✏</button>
    </div>
  </div>`;
}

function bcardHTML(b){
  const v=gc(b.id),p=pct(v,b.target);
  return `<div class="bcard">
    <div class="bcard-top"><div class="bcard-icon">${b.icon}</div><div class="bcard-name">${b.label}</div></div>
    <div class="bcard-val">${v}<span> / ${b.target}</span></div>
    <div class="bcard-info">${b.freq} · ${p}%</div>
    <div class="pbar" style="margin-bottom:10px"><div class="pfill" style="width:${p}%;background:${b.bc}"></div></div>
    <div class="bcard-btns">
      <button class="bsm" style="--ca:${b.bc}" onclick="dec('${b.id}')">−</button>
      <button class="bsm p" style="--ca:${b.bc}" onclick="inc('${b.id}')">+ 1</button>
      <button class="bsm" style="--ca:${b.bc}" onclick="promptSet('${b.id}','${b.label}')">✏</button>
    </div>
  </div>`;
}

const CSS_COLOR_MAP = {
  'var(--blue)':'#4f80ff','var(--green)':'#25d48a','var(--red)':'#ff4567',
  'var(--gold)':'#f0c040','var(--gray)':'#7070a0'
};

function contentDonutCard(g){
  const v=gc(g.id), p=pct(v,g.target);
  const hex = CSS_COLOR_MAP[g.ca] || '#4f80ff';
  const displayNames = {
    'yt_long':'YouTube Long','yt_short':'YouTube Shorts','tg':'Telegram Posts'
  };
  const name = displayNames[g.id] || g.label;
  return `<div class="content-donut-card">
    ${donutSVG(p, hex, 140, 14)}
    <div class="cd-label">${name}</div>
    <div class="cd-val">${fmt(v)} <span>/ ${fmt(g.target)}</span></div>
    <div class="cd-freq">${g.sub||''}</div>
    <div class="cd-btns">
      <button class="bsm" style="--ca:${g.ca}" onclick="dec('${g.id}')">−</button>
      <button class="bsm p" style="--ca:${g.ca}" onclick="inc('${g.id}')">+ 1</button>
      <button class="bsm" style="--ca:${g.ca}" onclick="promptSet('${g.id}','${g.label}')">✏</button>
    </div>
  </div>`;
}

function renderContent(){
  document.getElementById('contentGoals').innerHTML=GDEFS.filter(g=>g.grp==='content').map(contentDonutCard).join('');
}
function renderFinance(){
  const p=pct(fin,1000000);
  document.getElementById('finAmt').textContent =fmt(fin)+' ₽';
  document.getElementById('finLeft').textContent=fmt(Math.max(0,1000000-fin))+' ₽';
  document.getElementById('finBar').style.width =p+'%';
  document.getElementById('finPct').textContent =p+'% из 1 000 000 ₽';
  const now=new Date(),dl=Math.max(1,Math.ceil((END-now)/86400000));
  document.getElementById('finDay').textContent =fmt(Math.max(0,(1000000-fin)/dl))+' ₽/д';
  document.getElementById('finGoals').innerHTML =GDEFS.filter(g=>g.grp==='finance').map(gcardHTML).join('');
}
function addFin(){const v=parseFloat(document.getElementById('finIn').value);if(isNaN(v))return;fin=Math.max(0,fin+v);sv('lo_f',fin);document.getElementById('finIn').value='';renderFinance();renderOverview()}
function setFin(){const v=parseFloat(document.getElementById('finIn').value);if(isNaN(v))return;fin=Math.max(0,v);sv('lo_f',fin);document.getElementById('finIn').value='';renderFinance();renderOverview()}
function renderBody(){document.getElementById('bodyGrid').innerHTML=BDEFS.map(bcardHTML).join('')}
function renderLife(){document.getElementById('lifeGrid').innerHTML=LDEFS.map(bcardHTML).join('')}
function promptSet(id,label){
  const v=prompt(`${label}\nТекущее: ${gc(id)}\nНовое значение:`,gc(id));
  if(v!==null&&!isNaN(parseInt(v)))sc(id,parseInt(v));
}

// ── KANBAN ──
const SPHERES=[
  {id:'content',label:'Контент',     icon:'📹',color:'var(--blue)'},
  {id:'katya',  label:'Катя',        icon:'🧑‍💻',color:'var(--gray)'},
  {id:'finance',label:'Деньги',      icon:'💰',color:'var(--green)'},
  {id:'body',   label:'Энергия',     icon:'💪',color:'var(--red)'},
  {id:'life',   label:'Жизнь',       icon:'🌱',color:'var(--gold)'},
];
const COL_META=[
  {id:'todo',       label:'To Do',       color:'var(--muted)'},
  {id:'inprogress', label:'In Progress', color:'var(--blue)'},
  {id:'done',       label:'Done',        color:'var(--green)'},
];
let dragId=null,dragFrom=null,dragSphere=null;

function renderKanban(){
  document.getElementById('kanbanBoard').innerHTML=SPHERES.map(sp=>{
    const spData=kb[sp.id]||{todo:[],inprogress:[],done:[]};
    return `<div class="kb-sphere">
      <div class="kb-sphere-head">
        <span style="font-size:14px">${sp.icon}</span>
        <div class="kb-sphere-title" style="color:${sp.color}">${sp.label}</div>
        <div class="kb-sphere-line"></div>
        <button class="kb-sphere-btn" onclick="openModal('${sp.id}','todo')">+ Задача</button>
      </div>
      <div class="kb-cols">
        ${COL_META.map(col=>{
          const cards=spData[col.id]||[];
          const eid=`kc-${sp.id}-${col.id}`;
          return `<div class="kcol" id="${eid}"
            ondragover="event.preventDefault();document.getElementById('${eid}').classList.add('over')"
            ondragleave="document.getElementById('${eid}').classList.remove('over')"
            ondrop="dropCard(event,'${sp.id}','${col.id}')">
            <div class="kcol-head">
              <div class="kcol-title" style="color:${col.color}">${col.label}</div>
              <div class="kcol-cnt">${cards.length}</div>
            </div>
            ${cards.map(c=>`
              <div class="kcard" draggable="true" ondragstart="dragStart(event,'${c.id}','${sp.id}','${col.id}')">
                <div class="kcard-title">${c.title}</div>
                <div class="kcard-meta"><button class="kdel" onclick="delCard('${sp.id}','${col.id}','${c.id}')">✕</button></div>
              </div>`).join('')}
            <button class="add-card" onclick="openModal('${sp.id}','${col.id}')">+ Добавить</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function dragStart(e,id,sphere,col){dragId=id;dragSphere=sphere;dragFrom=col;e.dataTransfer.effectAllowed='move'}
function dropCard(e,sphere,toCol){
  e.preventDefault();
  document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('over'));
  if(!dragId||dragSphere!==sphere||dragFrom===toCol)return;
  const card=kb[sphere][dragFrom].find(c=>c.id===dragId);
  if(!card)return;
  kb[sphere][dragFrom]=kb[sphere][dragFrom].filter(c=>c.id!==dragId);
  kb[sphere][toCol].push(card);
  sv('lo_kb2',kb);renderKanban();dragId=dragFrom=dragSphere=null;
}
function delCard(sphere,col,id){kb[sphere][col]=kb[sphere][col].filter(c=>c.id!==id);sv('lo_kb2',kb);renderKanban()}

let modalTargetSphere='content',modalTargetCol='todo';
function openModal(sphere='content',col='todo'){
  modalTargetSphere=sphere;modalTargetCol=col;
  const sp=SPHERES.find(s=>s.id===sphere);
  document.getElementById('mModalTitle').textContent=`${sp.icon} ${sp.label}`;
  document.getElementById('mTitle').value='';
  document.getElementById('mCol').value=col;
  document.getElementById('mbk').classList.add('open');
  setTimeout(()=>document.getElementById('mTitle').focus(),50);
}
function closeModal(){document.getElementById('mbk').classList.remove('open')}
function saveCard(){
  const t=document.getElementById('mTitle').value.trim();if(!t)return;
  const col=document.getElementById('mCol').value;
  if(!kb[modalTargetSphere][col])kb[modalTargetSphere][col]=[];
  kb[modalTargetSphere][col].push({id:uid(),title:t});
  sv('lo_kb2',kb);closeModal();renderKanban();
}
document.getElementById('mbk').addEventListener('click',e=>{if(e.target===document.getElementById('mbk'))closeModal()});
document.getElementById('mTitle').addEventListener('keydown',e=>{if(e.key==='Enter')saveCard()});

// ── AI PANEL ──
let aiOpen=false;
function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('aiPanel').classList.toggle('open',aiOpen);
  if(aiOpen && document.getElementById('aiMessages').children.length===0){
    addAIMsg('assistant','Привет! Я могу изменять дашборд по твоей команде.\n\nНапример:\n• "добавь в жизнь йогу 3 раза в неделю"\n• "убери CS2 из жизни"\n• "добавь в энергию холодный душ раз в день"\n• "установи финансы 150000"\n• "обнули счётчик зала"');
  }
}

function addAIMsg(role, text){
  const el=document.createElement('div');
  el.className=`ai-msg ${role}`;
  el.textContent=text;
  document.getElementById('aiMessages').appendChild(el);
  document.getElementById('aiMessages').scrollTop=9999;
  return el;
}

function addAIThinking(){
  const el=document.createElement('div');
  el.className='ai-thinking';
  el.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('aiMessages').appendChild(el);
  document.getElementById('aiMessages').scrollTop=9999;
  return el;
}

async function sendAI(){
  const input=document.getElementById('aiInput');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';
  addAIMsg('user',msg);
  document.getElementById('aiSendBtn').disabled=true;
  const thinking=addAIThinking();

  // Build context snapshot for the AI
  const context = {
    BDEFS: BDEFS.map(b=>({id:b.id,label:b.label,icon:b.icon,freq:b.freq,target:b.target,bc:b.bc})),
    LDEFS: LDEFS.map(l=>({id:l.id,label:l.label,icon:l.icon,freq:l.freq,target:l.target,bc:l.bc})),
    GDEFS: GDEFS.map(g=>({id:g.id,grp:g.grp,label:g.label,sub:g.sub,target:g.target,ca:g.ca})),
    finance: fin,
    counters: cnts,
    kanban: kb,
    period: { start:'2026-03-20', end:'2026-08-01', totalDays:TDAYS, totalWeeks:TW }
  };

  const systemPrompt = `Ты AI-ассистент встроенный в личный дашборд. Пользователь управляет дашбордом голосом/текстом.
Тебе дан текущий контекст дашборда в JSON. Ответь ТОЛЬКО валидным JSON объектом (без markdown, без пояснений, только {}).

Структура ответа:
{
  "action": "update" | "message",
  "reply": "Короткий ответ пользователю на русском",
  "changes": {
    "addToBDEFS": [...],   // добавить карточку в раздел Энергия (объект: {id,label,icon,freq,target,bc})
    "removeFromBDEFS": "", // id карточки для удаления из Энергия
    "addToLDEFS": [...],   // добавить карточку в раздел Жизнь
    "removeFromLDEFS": "", // id для удаления из Жизнь
    "addToGDEFS": [...],   // добавить goal (объект: {id,grp,label,sub,target,ca})
    "removeFromGDEFS": "", // id для удаления из goals
    "setFinance": null,    // число — установить сумму финансов
    "addFinance": null,    // число — добавить к финансам
    "setCounter": {},      // {id: value} — установить счётчик
    "addKanbanCard": null, // {sphere, col, title} — добавить задачу в канбан
    "addToCalendar": null  // {date:"YYYY-MM-DD", slot:"s1"|"s2"|"s3"|"s4"|"s5", title:"текст"} — добавить задачу в недельный календарь
  }
}

Слоты календаря: s1=09-12, s2=12-15, s3=15-18, s4=18-21, s5=21-24
Сегодня: ${new Date().toISOString().slice(0,10)}

Правила:
- id всегда snake_case латиницей, уникальный
- target считай от периода: ${TW} недель, ${TDAYS} дней
- bc и ca: var(--blue), var(--green), var(--red), var(--gold), var(--gray)
- icon — подходящий эмодзи
- freq — строка типа "1×/нед", "ежедн.", "1/2 нед"
- Если пользователь говорит "добавь в календарь X в пятницу в 15:00" — используй addToCalendar с правильной датой и слотом
- Если не понял запрос — action:"message", reply с уточнением
- ТОЛЬКО JSON, никакого текста вне JSON`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: systemPrompt,
        messages:[
          {role:'user', content:`Контекст дашборда:\n${JSON.stringify(context,null,1)}\n\nКоманда пользователя: "${msg}"`}
        ]
      })
    });

    thinking.remove();
    const data = await resp.json();
    const raw = data.content?.find(b=>b.type==='text')?.text || '{}';

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch {
      addAIMsg('error','Не смог разобрать ответ. Попробуй ещё раз.');
      document.getElementById('aiSendBtn').disabled=false;
      return;
    }

    addAIMsg('assistant', parsed.reply || 'Готово.');

    if(parsed.action==='update' && parsed.changes){
      const c = parsed.changes;
      let changed = false;

      if(c.addToBDEFS?.length){
        c.addToBDEFS.forEach(item=>{ if(!BDEFS.find(b=>b.id===item.id)) BDEFS.push(item); });
        changed=true;
      }
      if(c.removeFromBDEFS){ BDEFS=BDEFS.filter(b=>b.id!==c.removeFromBDEFS); changed=true; }

      if(c.addToLDEFS?.length){
        c.addToLDEFS.forEach(item=>{ if(!LDEFS.find(l=>l.id===item.id)) LDEFS.push(item); });
        changed=true;
      }
      if(c.removeFromLDEFS){ LDEFS=LDEFS.filter(l=>l.id!==c.removeFromLDEFS); changed=true; }

      if(c.addToGDEFS?.length){
        c.addToGDEFS.forEach(item=>{ if(!GDEFS.find(g=>g.id===item.id)) GDEFS.push(item); });
        changed=true;
      }
      if(c.removeFromGDEFS){ GDEFS=GDEFS.filter(g=>g.id!==c.removeFromGDEFS); changed=true; }

      if(c.setFinance!=null){ fin=Math.max(0,c.setFinance); sv('lo_f',fin); changed=true; }
      if(c.addFinance!=null){ fin=Math.max(0,fin+c.addFinance); sv('lo_f',fin); changed=true; }

      if(c.setCounter && typeof c.setCounter==='object'){
        Object.entries(c.setCounter).forEach(([k,v])=>{ cnts[k]=Math.max(0,v); });
        sv('lo_c',cnts); changed=true;
      }

      if(c.addKanbanCard){
        const {sphere,col,title}=c.addKanbanCard;
        if(sphere && col && title){
          if(!kb[sphere]) kb[sphere]={todo:[],inprogress:[],done:[]};
          kb[sphere][col]=(kb[sphere][col]||[]);
          kb[sphere][col].push({id:uid(),title});
          sv('lo_kb2',kb); changed=true;
        }
      }

      if(c.addToCalendar){
        const {date, slot, title} = c.addToCalendar;
        if(date && slot && title){
          if(!weekPlan[date]) weekPlan[date]={};
          weekPlan[date][slot] = [{id:uid(), title}];
          sv('lo_wkplan', weekPlan); changed=true;
        }
      }

      if(changed){ saveDefs(); renderAll(); addAIMsg('system','✓ Дашборд обновлён'); }
    }
  } catch(err) {
    thinking.remove();
    addAIMsg('error','Ошибка соединения: '+err.message);
  }
  document.getElementById('aiSendBtn').disabled=false;
}

  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}
});
document.getElementById('wkAddModal').addEventListener('click',e=>{if(e.target===document.getElementById('wkAddModal'))wkCloseAdd()});
document.getElementById('wkAddInput').addEventListener('keydown',e=>{if(e.key==='Enter')wkSaveAdd()});
document.getElementById('wkDetailModal').addEventListener('click',e=>{if(e.target===document.getElementById('wkDetailModal'))wkCloseDetail()});

// ── TABS ──
const TAB_ORDER = ['overview','week','content','finance','body','life','kanban'];
let currentTabIdx = 0;

function switchTab(btn,name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelector(`.tab[onclick*="'${name}'"]`)?.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  currentTabIdx = TAB_ORDER.indexOf(name);
}

function switchToIdx(idx){
  if(idx < 0 || idx >= TAB_ORDER.length) return;
  const name = TAB_ORDER[idx];
  const btn = document.querySelector(`.tab[onclick*="'${name}'"]`);
  switchTab(btn, name);
  // scroll tab into view
  if(btn) btn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

// ── SWIPE SUPPORT ──
(function(){
  let startX=0, startY=0, startTime=0;
  const main = document.querySelector('.main');
  main.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, {passive:true});
  main.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startTime;
    // disable swipe on week tab (calendar needs horizontal scroll)
    if(TAB_ORDER[currentTabIdx] === 'week') return;
    if(dt < 400 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) switchToIdx(currentTabIdx + 1);
      else        switchToIdx(currentTabIdx - 1);
    }
  }, {passive:true});
})();

// ── WEEK PLANNER ──
const SLOTS = [
  {id:'s1', label:'09:00 – 12:00'},
  {id:'s2', label:'12:00 – 15:00'},
  {id:'s3', label:'15:00 – 18:00'},
  {id:'s4', label:'18:00 – 21:00'},
  {id:'s5', label:'21:00 – 24:00'},
];
const WK_DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const WK_MONTH = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const SPHERE_COLORS = {content:'var(--blue)',katya:'var(--gray)',finance:'var(--green)',body:'var(--red)',life:'var(--gold)'};

let wkOffset = 0;
// weekPlan: { 'YYYY-MM-DD': { s1:[{id,title,sphere}], s2:[], ... } }
let weekPlan = ld('lo_wkplan', {});

// drag state
let wkDragCard = null; // {id, title, sphere, fromDate, fromSlot} — fromDate/fromSlot null if from kanban

function dateKey(d){
  // Use local date, not UTC — avoids timezone shift issues
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function get14Days(offset){
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + offset*7);
  mon.setHours(0,0,0,0);
  return Array.from({length:14},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function shiftView(d){ wkOffset+=d; renderWeek(); }
function goToday(){ wkOffset=0; renderWeek(); }

function renderWeek(){
  const days = get14Days(wkOffset);
  const today = dateKey(new Date());
  const first=days[0], last=days[13];
  document.getElementById('wkPeriod').textContent =
    `${first.getDate()} ${WK_MONTH[first.getMonth()]} — ${last.getDate()} ${WK_MONTH[last.getMonth()]} ${last.getFullYear()}`;

  const SLOT_TIMES = ['09:00','12:00','15:00','18:00','21:00'];

  const timeCol = `<div class="wk-time-col">${SLOTS.map((_,i)=>
    `<div class="wk-time-label">${SLOT_TIMES[i]}</div>`
  ).join('')}</div>`;

  const rows = [days.slice(0,7), days.slice(7,14)];
  document.getElementById('wkGrid').innerHTML = rows.map(row => `
    <div class="wk-week-wrap">
      ${timeCol}
      <div class="wk-days-grid">
        ${row.map(d => {
          const key = dateKey(d);
          const plan = weekPlan[key] || {};
          const isToday = key===today;
          const isPast  = d < new Date() && !isToday;
          return `<div class="wk-day${isToday?' today':''}${isPast?' past':''}">
            <div class="wk-day-head">
              <div class="wk-day-name">${WK_DAY_NAMES[d.getDay()]}</div>
              <div class="wk-day-num">${d.getDate()}</div>
            </div>
            <div class="wk-slots">
              ${SLOTS.map((slot,si) => {
                const tasks = plan[slot.id] || [];
                const task = tasks[0]; // max 1
                if(task){
                  return `<div class="wk-slot wk-slot-filled" onclick="wkShowTask('${key}','${slot.id}','${task.id}')">
                    <div class="wk-slot-lbl">${SLOT_TIMES[si]}</div>
                    <div class="wk-task">
                      <div class="wk-task-title">${task.title}</div>
                      <button class="wk-task-del" onclick="wkDel('${key}','${slot.id}','${task.id}');event.stopPropagation()">✕</button>
                    </div>
                  </div>`;
                } else {
                  return `<div class="wk-slot" onclick="wkOpenAdd('${key}','${slot.id}')">
                    <div class="wk-slot-lbl">${SLOT_TIMES[si]}</div>
                    <div class="wk-slot-empty-hint">+ добавить</div>
                  </div>`;
                }
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`
  ).join('');
}

// Simple add modal state
let wkAddState = {date:null, slot:null};

function wkOpenAdd(date, slot){
  wkAddState = {date, slot};
  document.getElementById('wkAddInput').value = '';
  document.getElementById('wkAddModal').classList.add('open');
  setTimeout(() => document.getElementById('wkAddInput').focus(), 50);
}
function wkCloseAdd(){ document.getElementById('wkAddModal').classList.remove('open'); }
function wkSaveAdd(){
  const t = document.getElementById('wkAddInput').value.trim();
  if(!t) return;
  const {date, slot} = wkAddState;
  if(!weekPlan[date]) weekPlan[date] = {};
  if(!weekPlan[date][slot]) weekPlan[date][slot] = [];
  // only 1 task per slot
  weekPlan[date][slot] = [{id: uid(), title: t}];
  sv('lo_wkplan', weekPlan);
  wkCloseAdd();
  renderWeek();
}

// Show task detail modal
let wkDetailState = {date:null, slot:null, taskId:null};
function wkShowTask(date, slot, taskId){
  const task = weekPlan[date]?.[slot]?.find(t=>t.id===taskId);
  if(!task) return;
  wkDetailState = {date, slot, taskId};
  document.getElementById('wkDetailTitle').textContent = task.title;
  document.getElementById('wkDetailModal').classList.add('open');
}
function wkCloseDetail(){ document.getElementById('wkDetailModal').classList.remove('open'); }
function wkDelFromDetail(){
  const {date, slot, taskId} = wkDetailState;
  wkDel(date, slot, taskId);
  wkCloseDetail();
}
function wkEditFromDetail(){
  const {date, slot} = wkDetailState;
  wkCloseDetail();
  wkOpenAdd(date, slot);
}

function wkDel(date, slot, taskId){
  if(!weekPlan[date]?.[slot]) return;
  weekPlan[date][slot] = weekPlan[date][slot].filter(t => t.id !== taskId);
  sv('lo_wkplan', weekPlan);
  renderWeek();
}

function renderAll(){
  renderTopBar(); renderOverview(); renderContent();
  renderFinance(); renderBody(); renderLife(); renderKanban();
  renderWeek();
}

renderAll();
setInterval(renderTopBar, 30000);
</script>
